<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Hublo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- ÉCRAN DE CONNEXION -->
  <div id="login" class="login-screen">
    <div class="login-card">
      <div class="login-avatar">👤</div>
      <h1 class="login-name">Hublo</h1>
      <p class="login-sub">Votre espace, sur le serveur.</p>
      <form id="login-form" autocomplete="off">
        <input id="login-user" type="text" placeholder="utilisateur" autocapitalize="none" autocorrect="off" spellcheck="false" required>
        <input id="login-pass" type="password" placeholder="mot de passe" required>
        <button type="submit" id="login-btn">Se connecter →</button>
      </form>
      <div id="login-error" class="login-error"></div>
    </div>
    <div class="login-foot">Hublo · POC</div>
  </div>

  <!-- BUREAU -->
  <div id="desktop" class="desktop hidden">
    <!-- Barre de menu -->
    <div class="menubar">
      <div class="menu-left">
        <span class="apple"></span>
        <span class="menu-app" id="menu-active">Finder</span>
        <span class="menu-item">Fichier</span>
        <span class="menu-item">Édition</span>
        <span class="menu-item">Présentation</span>
      </div>
      <div class="menu-right">
        <span id="menu-user" class="menu-item"></span>
        <span class="menu-item" id="menu-logout" title="Se déconnecter">⏻</span>
        <span class="menu-clock" id="menu-clock"></span>
      </div>
    </div>

    <!-- Conteneur des fenêtres -->
    <div id="windows"></div>

    <!-- Dock -->
    <div class="dock">
      <div class="dock-item" data-app="finder" title="Finder"><span class="dock-ico">🗂️</span></div>
      <div class="dock-item" data-app="textedit" title="TextEdit"><span class="dock-ico">📝</span></div>
      <div class="dock-item" data-app="terminal" title="Terminal"><span class="dock-ico">🖥️</span></div>
      <div class="dock-item" data-app="monitor" title="Moniteur d’activité"><span class="dock-ico">📊</span></div>
      <div class="dock-sep"></div>
      <div class="dock-item" data-app="about" title="À propos"><span class="dock-ico">💧</span></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
